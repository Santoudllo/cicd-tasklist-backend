sonar.projectKey=tasklist-backend
sonar.projectName=TaskList Backend
sonar.projectVersion=1.0.0

# Sources
sonar.sources=src
sonar.tests=src/__tests__

# Tests
sonar.test.inclusions=src/__tests__/**/*.test.ts

# Fichiers exclus de l'analyse
sonar.exclusions=\
src/__tests__/**,\
src/server.ts,\
coverage/**,\
reports/**,\
node_modules/**,\
**/*.config.ts,\
prisma/**

# Fichiers exclus du calcul de couverture
sonar.coverage.exclusions=\
src/app.ts,\
src/server.ts,\
src/routes/**,\
src/lib/prisma.ts

# Rapport de couverture généré par Vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8